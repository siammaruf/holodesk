version: '3.8'

services:
    # PostgreSQL Database
    postgres:
        image: postgres:16-alpine
        container_name: nestjs-postgres
        restart: unless-stopped
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES_DATABASE:-nestjs_db}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
        networks:
            - nestjs-network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
            interval: 10s
            timeout: 5s
            retries: 5

    # NestJS Application (Development)
    app-dev:
        build:
            context: .
            dockerfile: Dockerfile.dev
        container_name: nestjs-app-dev
        restart: unless-stopped
        ports:
            - '${PORT:-4000}:4000'
        environment:
            NODE_ENV: development
            PORT: ${PORT:-4000}
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DATABASE: ${POSTGRES_DATABASE:-nestjs_db}
            AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
            AUTH_TOKEN_COOKIE_NAME: ${AUTH_TOKEN_COOKIE_NAME}
            AUTH_TOKEN_EXPIRED_TIME: ${AUTH_TOKEN_EXPIRED_TIME}
            MAIL_HOST: ${MAIL_HOST}
            MAIL_PORT: ${MAIL_PORT}
            MAIL_FROM: ${MAIL_FROM}
        volumes:
            - .:/app
            - /app/node_modules
            - ./logs:/app/logs
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - nestjs-network
        profiles:
            - dev

    # NestJS Application (Production)
    app-prod:
        build:
            context: .
            dockerfile: Dockerfile
            target: production
        container_name: nestjs-app-prod
        restart: unless-stopped
        ports:
            - '${PORT:-4000}:4000'
        environment:
            NODE_ENV: production
            PORT: ${PORT:-4000}
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DATABASE: ${POSTGRES_DATABASE}
            AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
            AUTH_TOKEN_COOKIE_NAME: ${AUTH_TOKEN_COOKIE_NAME}
            AUTH_TOKEN_EXPIRED_TIME: ${AUTH_TOKEN_EXPIRED_TIME}
        volumes:
            - ./logs:/app/logs
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - nestjs-network
        profiles:
            - prod

networks:
    nestjs-network:
        driver: bridge

volumes:
    postgres_data:
