version: '3.8'

# Production Docker Compose
services:
    postgres:
        image: postgres:16-alpine
        container_name: nestjs-postgres-prod
        restart: always
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DATABASE}
        volumes:
            - postgres_data_prod:/var/lib/postgresql/data
        networks:
            - nestjs-network-prod

    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: production
        container_name: nestjs-app-prod
        restart: always
        ports:
            - '4000:4000'
        environment:
            NODE_ENV: production
            PORT: ${PORT:-4000}
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DATABASE: ${POSTGRES_DATABASE}
            AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
            AUTH_TOKEN_COOKIE_NAME: ${AUTH_TOKEN_COOKIE_NAME}
            AUTH_TOKEN_EXPIRED_TIME: ${AUTH_TOKEN_EXPIRED_TIME}
        volumes:
            - ./logs:/app/logs
        depends_on:
            - postgres
        networks:
            - nestjs-network-prod

    # Nginx Reverse Proxy (optional)
    nginx:
        image: nginx:alpine
        container_name: nestjs-nginx
        restart: always
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - ./ssl:/etc/nginx/ssl:ro
        depends_on:
            - app
        networks:
            - nestjs-network-prod
        profiles:
            - nginx

networks:
    nestjs-network-prod:
        driver: bridge

volumes:
    postgres_data_prod:
